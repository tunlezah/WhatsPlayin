name: Build macOS App

on:
  push:
    branches: [ main, 'claude/**' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: macos-15

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Select Xcode
      run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

    - name: Show Xcode version
      run: xcodebuild -version

    - name: Build
      run: |
        xcodebuild build \
          -project WhatsPlayin.xcodeproj \
          -scheme WhatsPlayin \
          -destination 'platform=macOS' \
          -configuration Debug \
          -derivedDataPath build \
          CODE_SIGN_IDENTITY="-" \
          CODE_SIGNING_REQUIRED=NO \
          CODE_SIGNING_ALLOWED=NO

    - name: Package app
      run: |
        APP_PATH=$(find build/Build/Products/Debug -name "WhatsPlayin.app" -type d | head -1)
        echo "Found app at: $APP_PATH"
        ditto -c -k --keepParent "$APP_PATH" WhatsPlayin-Debug.zip

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: WhatsPlayin-Debug
        path: WhatsPlayin-Debug.zip
        retention-days: 30
